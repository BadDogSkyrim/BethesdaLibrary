name: Deploy docs

# Build the MkDocs site and publish it to the gh-pages branch on every push
# to main that touches the docs, the nav config, or the pinned dependencies.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - requirements.txt
      - .github/workflows/deploy-docs.yml
  workflow_dispatch: {}

# gh-deploy force-pushes the built site to the gh-pages branch.
permissions:
  contents: write

# Never run two deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # --strict would fail the build on broken links; the library still has
      # many intentional [TBD] links, so keep it non-strict for now.
      - run: mkdocs gh-deploy --force
