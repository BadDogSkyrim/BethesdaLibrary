site_name: Bethesda Modding Library
site_description: Comprehensive reference for Skyrim, Fallout 4, and Starfield modding with PyNifly and esplib
site_author: Hugh Russel
repo_url: https://github.com/BadDogSkyrim/BethesdaLibrary
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# NOTE: This nav lists only pages that currently exist. Many topics are still
# planned (Workflows, Debugging, Reference, AI Reference, esplib, Skyrim
# game-specific pages) — see README.md, where those are tagged [TBD]. Add nav
# entries here as the pages are written.
nav:
  - Home: index.md

  - File Formats:
    - Overview: file-formats/overview.md
    - Plugins (ESP/ESM): file-formats/plugins.md
    - NIF Files: file-formats/nif-files.md
    - NIF Animations: file-formats/nif-animations.md
    - Animations (HKX): file-formats/animations.md
    - Physics & Collision: file-formats/physics-collision.md
    - Morphs & Shape Keys: file-formats/morphs-shapekeys.md
    - Textures & Materials: file-formats/textures-materials.md
    - Archives (BSA): file-formats/archives.md
    - Scripts (PEX): file-formats/scripts.md

  - Game-Specific:
    - Fallout 4:
      - Connect Points: game-specific/fallout4/connect-points.md
      - Dismemberment: game-specific/fallout4/dismemberment.md
    - Starfield:
      - Overview: file-formats/starfield-overview.md
      - Meshes (NIF + .mesh): file-formats/starfield-meshes.md
      - Materials & Textures: file-formats/starfield-materials.md
      - "  ↳ .mat worked example": file-formats/starfield-material-worked-example.md
      - Chargen, Race & Skeleton: file-formats/starfield-chargen.md
      - Plugins & Archives: file-formats/starfield-plugins.md
      - Tools: file-formats/starfield-tools.md

  - Tools:
    - PyNifly:
      - Overview: tools/pynifly/overview.md
      - Installation: tools/pynifly/installation.md

  - Conventions: CONVENTIONS.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BadDogSkyrim/BethesdaLibrary
